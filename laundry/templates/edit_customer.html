{% extends 'base.html' %}
{% block title %}Edit {{ customer.name }}{% endblock %}
{% block page_title %}Edit Customer{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <strong><i class="bi bi-pencil me-2"></i>Edit — {{ customer.name }}</strong>
        <a href="{% url 'customer_detail' customer.id %}" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Back
        </a>
      </div>
      <div class="card-body">
        <form method="POST">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" name="name" class="form-control" value="{{ customer.name }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Phone Number</label>
            <input type="text" name="contact" class="form-control" value="{{ customer.contact }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" value="{{ customer.email|default:'' }}">
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Address</label>
            <textarea name="address" class="form-control" rows="2">{{ customer.address|default:'' }}</textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Notes / Preferences</label>
            <textarea name="notes" class="form-control" rows="2">{{ customer.notes|default:'' }}</textarea>
          </div>

          <div class="mb-4">
            <div class="form-check form-switch">
              <input type="checkbox" name="is_walk_in" class="form-check-input" id="walkIn" role="switch"
                     {% if customer.is_walk_in %}checked{% endif %}>
              <label class="form-check-label" for="walkIn">Walk-in customer</label>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-fill">Save Changes</button>
            <a href="{% url 'customer_detail' customer.id %}" class="btn btn-outline-secondary flex-fill">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
