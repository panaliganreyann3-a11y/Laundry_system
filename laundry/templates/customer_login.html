<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customer Login - Smart Laundry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh">
  <div class="card shadow border-0" style="width:100%;max-width:420px">
    <div class="card-body p-4">
      <h4 class="fw-bold mb-1 text-center">Customer Login</h4>
      <p class="text-muted text-center mb-4">Pickup and delivery portal</p>
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" autofocus required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100">Login</button>
      </form>
      <p class="text-center small text-muted mt-3 mb-0">
        Need an account? <a href="{% url 'customer_register' %}">Register</a>
      </p>
      <p class="text-center small mt-2 mb-0">
        <a href="{% url 'staff_login' %}">Staff login</a>
      </p>
    </div>
  </div>
</div>
</body>
</html>
