{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Smart Laundry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'accounts/css/auth.css' %}" rel="stylesheet">
</head>
<body class="auth-body">
<div class="auth-bubbles"></div>
<main class="auth-shell">
  <section class="auth-card">
    <div class="text-center">
      <div class="auth-mark"><i class="bi bi-water"></i></div>
      <h1 class="h3 auth-title mb-1">Smart Laundry</h1>
      <p class="auth-subtitle mb-0">Fresh, clean access</p>
    </div>

    <div class="auth-wave"></div>

    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
      <div class="alert alert-danger">Invalid username or password.</div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="loginPassword" class="form-control pe-5" required>
          <button type="button" class="password-toggle" data-password-toggle="loginPassword" aria-label="Show password">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-auth w-100">Login</button>
    </form>
  </section>
</main>
<script src="{% static 'accounts/js/auth.js' %}"></script>
</body>
</html>
