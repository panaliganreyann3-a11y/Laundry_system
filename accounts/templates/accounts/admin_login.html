<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login - Smart Laundry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body class="bg-dark">
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
    <div class="text-center mb-4">
      <div style="font-size: 2.5rem;"></div>
      <h4>Admin Login</h4>
      <p class="text-muted small">Smart Laundry Management</p>
    </div>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-bold">Username</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-danger w-100">Login as Admin</button>
    </form>

    <hr>
    <p class="text-center small text-muted mb-0">
      Staff? <a href="{% url 'staff_login' %}">Login here</a>
    </p>
    <p class="text-center small text-muted mt-2 mb-0">
      Customer? <a href="{% url 'customer_login' %}">Pickup portal</a>
    </p>
  </div>
</div>
<script src="{% static 'accounts/js/auth.js' %}"></script>
</body>
</html>
