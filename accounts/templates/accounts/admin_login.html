<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login - Smart Laundry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'accounts/css/auth.css' %}" rel="stylesheet">
</head>
<body class="auth-body">
<div class="auth-bubbles"></div>
<main class="auth-shell">
  <section class="auth-card">
    <div class="text-center">
      <div class="auth-mark"><i class="bi bi-shield-lock"></i></div>
      <h1 class="h3 auth-title mb-1">Admin Login</h1>
      <p class="auth-subtitle mb-0">Laundry management control panel</p>
    </div>

    <div class="auth-wave"></div>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="adminPassword" class="form-control" required>
          <button type="button" class="password-toggle" data-password-toggle="adminPassword" aria-label="Show password">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-auth w-100">Login as Admin</button>
    </form>

    <div class="text-center small mt-4">
      <p class="text-muted mb-2">Staff? <a class="auth-link" href="{% url 'staff_login' %}">Login here</a></p>
      <p class="text-muted mb-0">Customer? <a class="auth-link" href="{% url 'customer_login' %}">Pickup portal</a></p>
    </div>
  </section>
</main>
<script src="{% static 'accounts/js/auth.js' %}"></script>
</body>
</html>
