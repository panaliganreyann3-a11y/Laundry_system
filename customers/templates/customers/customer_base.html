<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Customer Portal{% endblock %} - Smart Laundry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#f3f7fb; font-family:'Segoe UI', system-ui, sans-serif; }
    .portal-nav { background:#0f2044; }
    .portal-shell { max-width:1120px; margin:0 auto; padding:22px 16px; }
    .card { border:0; border-radius:10px; box-shadow:0 2px 8px rgba(15,32,68,.08); }
    .stat { background:#fff; border-radius:10px; padding:16px; box-shadow:0 2px 8px rgba(15,32,68,.08); }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark portal-nav">
  <div class="container-fluid px-3">
    <a class="navbar-brand fw-bold" href="{% url 'customer_dashboard' %}">Smart Laundry</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#customerMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="customerMenu">
      <div class="navbar-nav me-auto">
        <a class="nav-link" href="{% url 'customer_dashboard' %}">Dashboard</a>
        <a class="nav-link" href="{% url 'customer_new_order' %}">Request Pickup</a>
        <a class="nav-link" href="{% url 'customer_order_history' %}">Orders</a>
        <a class="nav-link" href="{% url 'customer_profile' %}">Profile</a>
      </div>
      <form method="post" action="{% url 'logout' %}" class="d-flex">
        {% csrf_token %}
        <input type="hidden" name="next" value="{% url 'customer_login' %}">
        <button class="btn btn-outline-light btn-sm">Logout</button>
      </form>
    </div>
  </div>
</nav>

<main class="portal-shell">
  {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
