{% extends 'customers/customer_base.html' %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header bg-white"><strong>My Profile</strong></div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" value="{{ customer.name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contact Number</label>
            <input type="text" name="contact" class="form-control" value="{{ customer.contact }}" inputmode="numeric" maxlength="11" pattern="\d{11}" required>
            <div class="form-text">The number must start with 09.</div>
            <div class="invalid-feedback">Contact number must be exactly 11 digits and start with 09.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{ customer.email }}" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Default Address</label>
            <textarea name="address" class="form-control" rows="3" required>{{ customer.address }}</textarea>
          </div>
          <button class="btn btn-primary">Save Profile</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
