<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account - Smart Laundry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <div class="card shadow border-0">
        <div class="card-body p-4">
          <h4 class="fw-bold mb-1">Create Customer Account</h4>
          <p class="text-muted mb-4">Request pickup and delivery after signing in.</p>
          {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Contact Number</label>
              <input type="text" name="contact" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Address</label>
              <textarea name="address" class="form-control" rows="2" required></textarea>
            </div>
            <div class="row g-2">
              <div class="col-md-6 mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password1" class="form-control" minlength="8" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="password2" class="form-control" minlength="8" required>
              </div>
            </div>
            <button class="btn btn-primary w-100">Create Account</button>
          </form>
          <p class="text-center small text-muted mt-3 mb-0">
            Already registered? <a href="{% url 'customer_login' %}">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
